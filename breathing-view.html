<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Training Tracker | Дихальна View</title>
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="apple-touch-icon" href="img/web-app-manifest-192x192.png" />
    <meta name="theme-color" content="#142233" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body data-page="breathing-view">
    <div class="app-shell">
      <header class="page-header">
        <div class="page-header__inner">
          <div class="page-header__title-row">
            <h1>Дихальна View</h1>
            <p class="page-header__date" id="business-date"></p>
          </div>
        </div>
      </header>

      <main class="page-main page-main--wide">
        <section class="page-section page-section--tight">
          <div class="section-heading section-heading--compact">
            <div>
              <p class="section-heading__eyebrow">Окрема історія дихання</p>
              <h2>Таблиця дихальних вправ</h2>
            </div>
            <p class="section-heading__hint" id="breathing-review-count"></p>
          </div>

          <div class="table-card">
            <div class="table-wrap">
              <table class="review-table">
                <thead>
                  <tr>
                    <th>Дата</th>
                    <th>Вправа</th>
                    <th>Повтори / Опис</th>
                    <th>Хв</th>
                  </tr>
                </thead>
                <tbody id="breathing-review-table-body"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="Основна навігація"></nav>
    </div>

    <script type="module" src="scripts/breathing-review.js"></script>
  </body>
</html>
