<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Training Tracker | Settings</title>
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="apple-touch-icon" href="img/web-app-manifest-192x192.png" />
    <meta name="theme-color" content="#142233" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body data-page="settings">
    <div class="app-shell">
      <header class="page-header">
        <div class="page-header__inner">
          <div class="page-header__title-row">
            <h1>Settings</h1>
            <p class="page-header__date" id="business-date"></p>
          </div>
        </div>
      </header>

      <main class="page-main">
        <section class="page-section page-section--tight">
          <div class="section-heading section-heading--compact">
            <div>
              <p class="section-heading__eyebrow">Підготовка до синхронізації</p>
              <h2>Google Drive</h2>
            </div>
            
          </div>

          <div class="settings-grid">
            <button class="primary-button settings-button" type="button" id="settings-export-drive">
              Відправити на гугл диск JSON з localStorage
            </button>
            <button class="secondary-button settings-button" type="button" id="settings-import-drive">
              Оновити localStorage з гугл диск
            </button>
          </div>

          <p class="settings-status is-hidden" id="settings-status" aria-live="polite"></p>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="Основна навігація"></nav>
    </div>

    <script type="module" src="scripts/settings.js"></script>
  </body>
</html>
